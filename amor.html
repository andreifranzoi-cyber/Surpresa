<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Só pra lembrar que te amo ❤️</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    linear-gradient(135deg,
    #fff5f7 0%,
    #ffe4ec 40%,
    #fff0f5 100%);
  font-family:'Lato',sans-serif;
  position:relative;
}

/* partículas coração */

.hearts{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
}

.heart{
  position:absolute;
  color:#ff4d88;
  animation:fall linear forwards;
  opacity:.8;
}

@keyframes fall{

  from{
    transform:translateY(-10vh) rotate(0deg);
  }

  to{
    transform:translateY(110vh) rotate(360deg);
  }
}

/* container */

.container{
  position:relative;
  z-index:2;
  text-align:center;
  padding:40px 25px;
  max-width:700px;
  animation:fadeUp 1.2s ease;
}

@keyframes fadeUp{

  from{
    opacity:0;
    transform:translateY(40px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }
}

.title{
  font-family:'Playfair Display',serif;
  font-size:clamp(42px,7vw,80px);
  color:#d6336c;
  margin-bottom:20px;
}

.text{
  font-size:clamp(18px,2.5vw,24px);
  color:#5c374c;
  line-height:1.8;
  font-weight:400;
}

.highlight{
  color:#d6336c;
  font-weight:700;
}

.signature{
  margin-top:35px;
  font-size:20px;
  color:#8a4762;
  font-style:italic;
}

.glow{
  position:absolute;
  width:400px;
  height:400px;
  background:#ff99bb;
  border-radius:50%;
  filter:blur(120px);
  opacity:.25;
  z-index:0;
}

.glow.one{
  top:-100px;
  left:-100px;
}

.glow.two{
  bottom:-120px;
  right:-100px;
}

/* botão */

.btn{
  margin-top:40px;
  display:inline-block;
  padding:16px 34px;
  border-radius:999px;
  background:linear-gradient(135deg,#ff4d88,#ff80aa);
  color:white;
  text-decoration:none;
  font-weight:700;
  box-shadow:0 10px 30px rgba(255,77,136,.3);
  transition:.25s;
}

.btn:hover{
  transform:scale(1.05);
}

/* player escondido */

audio{
  display:none;
}

</style>
</head>

<body>

<div class="glow one"></div>
<div class="glow two"></div>

<!-- corações -->

<div class="hearts" id="hearts"></div>

<!-- conteúdo -->

<div class="container">

  <h1 class="title">
    Eu te amo ❤️
  </h1>

  <p class="text">
    Obrigado por me dar forças para acreditar
    <span class="highlight">
     todos os dias.
    </span>

    <br><br>

    Obrigado por existir,
    por me fazer sorrir,
    e por transformar tudo em coisas boas.

    <br><br>

    Independente do que aconteça,
    nunca esqueça:
    <span class="highlight">
     to aqui por ti.
    </span>
  </p>

  <div class="signature">
    A+G
  </div>

</div>

<!-- música -->

<audio id="musica" loop autoplay>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

/* música */

const musica =
  document.getElementById("musica");

window.addEventListener("load", () => {

  musica.volume = 0.35;

  const tocar = musica.play();

  if(tocar !== undefined){

    tocar.catch(() => {

      document.addEventListener("click", () => {

        musica.play();

      }, { once:true });

    });

  }

});

/* corações */

const hearts =
  document.getElementById("hearts");

function criarCoracao(){

  const heart =
    document.createElement("div");

  heart.classList.add("heart");

  heart.innerHTML = "❤";

  heart.style.left =
    Math.random() * 100 + "vw";

  heart.style.fontSize =
    (16 + Math.random() * 30) + "px";

  heart.style.animationDuration =
    (5 + Math.random() * 6) + "s";

  hearts.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 11000);
}

setInterval(criarCoracao, 300);

</script>

</body>
</html>
