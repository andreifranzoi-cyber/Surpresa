<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Só pra lembrar que te amo ❤️</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, #fff5f7 0%, #fce4ec 40%, #fdf0f5 70%, #fff5f7 100%);
    min-height: 100vh;
    overflow-x: hidden;
    font-family: 'Lato', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 40px 20px;
    max-width: 600px;
    width: 100%;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1.2s ease 0.5s forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .subtitle {
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #c8a0b0;
    margin-bottom: 18px;
    font-weight: 300;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(38px, 8vw, 62px);
    color: #9b4d6b;
    line-height: 1.15;
    margin-bottom: 30px;
    font-weight: 700;
  }

  .title em {
    font-style: italic;
    color: #c2718b;
  }

  .photo-frame {
    position: relative;
    display: inline-block;
    margin: 0 auto 32px;
  }

  .photo-frame::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    background: linear-gradient(135deg, #f7c5d5, #e8a0b8, #f0b8c8, #e89ab0);
    z-index: -1;
    animation: rotateBorder 6s linear infinite;
  }

  @keyframes rotateBorder {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .photo-frame img {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    display: block;
    border: 6px solid #fff;
    box-shadow: 0 8px 40px rgba(180, 80, 120, 0.25);
  }

  .message-card {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 36px 32px;
    box-shadow: 0 4px 40px rgba(180, 80, 120, 0.12);
    border: 1px solid rgba(255,255,255,0.9);
    margin-bottom: 20px;
  }

  .message {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 5vw, 32px);
    color: #8b3a5a;
    line-height: 1.5;
    font-style: italic;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    justify-content: center;
  }

  .divider span {
    font-size: 20px;
    animation: heartbeat 1.4s ease infinite;
  }

  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.25); }
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    max-width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #e0a0b8, transparent);
  }

  .from {
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    color: #c0879a;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 300;
  }

  .floating-hearts {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }

  .petals {
    position: absolute;
    font-size: 18px;
    opacity: 0;
    animation: fall linear infinite;
    user-select: none;
  }

  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 0.9; }
    100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
  }
</style>
</head>

<div class="container">
  <p class="subtitle">uma mensagem especial</p>
  <h1 class="title">Para a <em>pessoa</em><br>mais especial</h1>

  <div class="photo-frame">
    <img id="photo" src="" alt="Nós dois" />
  </div>

  <div class="message-card">
    <p class="message">"Só pra lembrar<br>que te amo"</p>
    <div class="divider"><span>❤️</span></div>
    <p class="from">Com todo o meu amor</p>
  </div>
</div>

// Sparkle canvas
const canvas = document.getElementById('sparkles');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

const particles = [];
for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2 + 0.5,
    a: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.3 + 0.1,
    opacity: Math.random()
  });
}

function drawSparkles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.opacity += (Math.random() - 0.5) * 0.05;
    p.opacity = Math.max(0, Math.min(1, p.opacity));
    p.x += Math.cos(p.a) * p.speed * 0.5;
    p.y += Math.sin(p.a) * p.speed * 0.5;
    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height;
    if (p.y > canvas.height) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(200, 130, 160, ${p.opacity * 0.5})`;
    ctx.fill();
  });
  requestAnimationFrame(drawSparkles);
}
drawSparkles();

// Falling hearts
const emojis = ['❤️','🩷','💕','💖','💗','✨','🌸','💝'];
const fh = document.getElementById('fh');

function spawnHeart() {
  const el = document.createElement('div');
  el.className = 'petals';
  el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (14 + Math.random() * 18) + 'px';
  const dur = 4 + Math.random() * 5;
  el.style.animationDuration = dur + 's';
  el.style.animationDelay = Math.random() * 2 + 's';
  fh.appendChild(el);
  setTimeout(() => el.remove(), (dur + 2) * 1000);
}

setInterval(spawnHeart, 350);
for (let i = 0; i < 12; i++) spawnHeart();

// Audio - gentle melody using Web Audio
try {
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const ac = new AudioCtx();

  const notes = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 392.00, 349.23, 329.63, 293.66, 261.63];
  const times = [0, 0.5, 1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5];

  function playMelody() {
    notes.forEach((freq, i) => {
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.connect(gain);
      gain.connect(ac.destination);
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t = ac.currentTime + times[i];
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.08, t + 0.1);
      gain.gain.linearRampToValueAtTime(0, t + 0.45);
      osc.start(t);
      osc.stop(t + 0.5);
    });
    setTimeout(playMelody, 6500);
  }

  document.addEventListener('click', () => { ac.resume(); playMelody(); }, { once: true });
  document.addEventListener('touchstart', () => { ac.resume(); playMelody(); }, { once: true });
  window.addEventListener('load', () => setTimeout(() => { ac.resume(); playMelody(); }, 800));
} catch(e) {}
</script>

  <source src="musica.mp3" type="audio/mpeg">
</audio>
