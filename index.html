<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Não clique nesse botão</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@400;700;900&display=swap');

:root {
  --bg: #111827;
  --accent: #ef4444;
  --yellow: #facc15;
  --green: #22c55e;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background: var(--bg);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  font-family:'Nunito', sans-serif;
  position:relative;
}

/* fundo */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
  background-size:40px 40px;
}

.container{
  position:relative;
  z-index:2;
  text-align:center;
  padding:20px;
}

.badge{
  display:inline-block;
  background:var(--yellow);
  color:#111;
  padding:6px 16px;
  border-radius:999px;
  font-weight:900;
  letter-spacing:2px;
  font-size:12px;
  margin-bottom:24px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%,100%{opacity:1}
  50%{opacity:.5}
}

.title{
  color:white;
  font-size:clamp(40px, 8vw, 90px);
  line-height:1;
  font-family:'Black Han Sans', sans-serif;
}

.title span{
  color:var(--accent);
}

.subtitle{
  color:rgba(255,255,255,.5);
  margin-top:16px;
  margin-bottom:50px;
  font-size:18px;
}

.btn-wrapper{
  position:relative;
  display:inline-block;
}

.btn-wrapper::before{
  content:'';
  position:absolute;
  inset:-20px;
  border:2px dashed rgba(239,68,68,.3);
  border-radius:50%;
  animation:spin 8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

.btn{
  width:180px;
  height:180px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  background:radial-gradient(circle at 30% 30%, #f87171, #dc2626, #7f1d1d);
  box-shadow:
    0 0 60px rgba(239,68,68,.4),
    inset 0 4px 10px rgba(255,255,255,.2);
  color:white;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:.15s;
  position:relative;
  overflow:hidden;
}

.btn:hover{
  transform:scale(1.05);
}

.btn:active{
  transform:scale(.95);
}

.btn::before{
  content:'';
  position:absolute;
  top:15%;
  left:20%;
  width:40%;
  height:20%;
  background:rgba(255,255,255,.15);
  border-radius:50%;
  filter:blur(5px);
}

.emoji{
  font-size:55px;
  animation:wiggle 2s infinite;
}

@keyframes wiggle{
  0%,100%{transform:rotate(-5deg)}
  50%{transform:rotate(5deg)}
}

.label{
  margin-top:5px;
  font-size:12px;
  font-weight:900;
  letter-spacing:2px;
}

.caption{
  margin-top:40px;
  color:rgba(255,255,255,.2);
  font-size:14px;
}

/* EXPLOSÃO */

#overlay{
  position:fixed;
  inset:0;
  background:#111827;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:999;
  opacity:0;
  visibility:hidden;
  transition:.5s;
}

#overlay.active{
  opacity:1;
  visibility:visible;
}

.big-emoji{
  font-size:120px;
  animation:bounce .6s ease;
}

@keyframes bounce{
  0%{transform:scale(0)}
  60%{transform:scale(1.3)}
  100%{transform:scale(1)}
}

.big-text{
  color:var(--yellow);
  font-size:clamp(35px, 7vw, 70px);
  font-family:'Black Han Sans', sans-serif;
  margin-top:10px;
}

.small-text{
  color:rgba(255,255,255,.6);
  margin-top:10px;
  margin-bottom:40px;
}

.redirect-btn{
  background:linear-gradient(135deg,#ec4899,#db2777);
  color:white;
  text-decoration:none;
  padding:16px 34px;
  border-radius:999px;
  font-weight:900;
  transition:.2s;
  opacity:0;
  transform:translateY(20px);
}

.redirect-btn.show{
  opacity:1;
  transform:translateY(0);
}

.redirect-btn:hover{
  transform:scale(1.05);
}

.particle{
  position:fixed;
  font-size:24px;
  pointer-events:none;
  animation:fly 1s forwards;
}

@keyframes fly{
  to{
    transform:
      translate(var(--x), var(--y))
      rotate(720deg)
      scale(1.5);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="badge">
    ⚠ AVISO IMPORTANTE ⚠
  </div>

  <h1 class="title">
    NÃO <span>CLIQUE</span><br>
    NESSE BOTÃO
  </h1>

  <p class="subtitle">
    sério. não vai ser legal.
  </p>

  <div class="btn-wrapper">
    <button class="btn" id="btn">
      <div class="emoji">💨</div>
      <div class="label">NÃO CLICA</div>
    </button>
  </div>

  <p class="caption">
    você foi avisado(a).
  </p>

</div>

<!-- overlay -->
<div id="overlay">

  <div class="big-emoji">💨</div>

  <div class="big-text">
    PRRRRRT 💀
  </div>

  <div class="small-text">
    eu te avisei...
  </div>

  <a href="amor.html" class="redirect-btn" id="redirectBtn">
    tá bom... o que é isso? →
  </a>

</div>

<script>

const btn = document.getElementById('btn');
const overlay = document.getElementById('overlay');
const redirectBtn = document.getElementById('redirectBtn');

btn.addEventListener('click', () => {

  playFart();
  particles();

  overlay.classList.add('active');

  setTimeout(() => {
    redirectBtn.classList.add('show');
  }, 800);

});

function particles(){

  const emojis = ['💨','💀','🤢','☁️','😵'];

  for(let i=0;i<20;i++){

    const p = document.createElement('div');

    p.className = 'particle';
    p.innerText = emojis[Math.floor(Math.random()*emojis.length)];

    p.style.left = window.innerWidth/2 + 'px';
    p.style.top = window.innerHeight/2 + 'px';

    p.style.setProperty('--x', (Math.random()*600-300)+'px');
    p.style.setProperty('--y', (Math.random()*600-300)+'px');

    document.body.appendChild(p);

    setTimeout(()=>{
      p.remove();
    },1000);
  }
}

function playFart(){

  try{

    const ctx = new(window.AudioContext || window.webkitAudioContext)();

    const bufferSize = ctx.sampleRate * 0.7;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);

    const data = buffer.getChannelData(0);

    for(let i=0;i<bufferSize;i++){
      data[i] = (Math.random()*2-1)*(1-i/bufferSize);
    }

    const noise = ctx.createBufferSource();
    noise.buffer = buffer;

    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 180;

    const gain = ctx.createGain();
    gain.gain.setValueAtTime(.7, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.01, ctx.currentTime + .7);

    noise.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);

    noise.start();
    noise.stop(ctx.currentTime + .7);

  }catch(e){
    console.log(e);
  }
}

</script>

</body>
</html>
